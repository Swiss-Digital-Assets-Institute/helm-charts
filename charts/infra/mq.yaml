{{- if and (.Values.aws.mq.enabled | default false) (.Values.aws.enabled | default true) }}
---
# AWS MQ RabbitMQ Broker Claim
apiVersion: messaging.hashgraphgroup.com/v1alpha1
kind: RabbitMQBrokerClaim
metadata:
  name: {{ include "infra.releaseName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  region: {{ .Values.aws.region | quote }}
  brokerName: {{ .Values.aws.mq.brokerNameOverride | default (include "infra.resourceName" .) | quote }}
  instanceType: {{ .Values.aws.mq.instanceType | default "mq.m5.large" | quote }}
  deploymentMode: {{ .Values.aws.mq.deploymentMode | default "SINGLE_INSTANCE" | quote }}
  engineVersion: {{ .Values.aws.mq.engineVersion | default "3.13" | quote }}
  autoMinorVersionUpgrade: {{ .Values.aws.mq.autoMinorVersionUpgrade | default true }}
  publiclyAccessible: {{ .Values.aws.mq.publiclyAccessible | default false }}
  {{- if .Values.aws.mq.maintenanceWindowStartTime }}
  maintenanceWindowStartTime:
    dayOfWeek: {{ .Values.aws.mq.maintenanceWindowStartTime.dayOfWeek | default "SUNDAY" | quote }}
    timeOfDay: {{ .Values.aws.mq.maintenanceWindowStartTime.timeOfDay | default "03:00" | quote }}
    timeZone: {{ .Values.aws.mq.maintenanceWindowStartTime.timeZone | default "UTC" | quote }}
  {{- end }}
  adminUsername: {{ required "aws.mq.adminUsername is required" .Values.aws.mq.adminUsername | quote }}
  adminPasswordSecretRef:
    name: {{ printf "kvv-%s-infra" (include "infra.releaseName" .) | quote }}
    key: {{ .Values.aws.mq.adminPasswordSecretRef.key | default "RABBITMQ_ADMIN_PASSWORD" | quote }}
    namespace: {{ .Release.Namespace | quote }}
  compositionRef:
    name: hashgraph-rabbitmq-brokers
  writeConnectionSecretToRef:
    name: {{ printf "%s-mq-connection" (include "infra.releaseName" .) | quote }}
  tags:
{{ include "infra.allTags" (dict "Values" .Values "section" .Values.aws.mq) | indent 4 }}
{{- end }}
